# ─── DEV / DEMO profile ────────────────────────────────────────────────────────
# R2DBC for reactive queries, JDBC for Flyway migrations (Flyway needs JDBC).
# Run: ./gradlew bootRun --args='--spring.profiles.active=dev'

spring:
  r2dbc:
    url: r2dbc:h2:mem:///allicatest-webflux?options=DB_CLOSE_DELAY=-1
    username: sa
    password:

  # Flyway requires a JDBC datasource even in a reactive application.
  # It runs once at startup (blocking is acceptable during boot).
  datasource:
    url: jdbc:h2:mem:allicatest-webflux;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
      - classpath:db/migration/dev

logging:
  level:
    com.allicatest: DEBUG
