spring:
  datasource:
    url: jdbc:h2:mem:allicatest-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate.ddl-auto: validate
    show-sql: false
    properties.hibernate.search:
      backend.type: lucene
      backend.directory.type: local-heap
      schema-management.strategy: drop-and-create
  flyway:
    enabled: true
    locations: classpath:db/migration
logging:
  level:
    com.allicatest: WARN
    org.flywaydb: WARN
